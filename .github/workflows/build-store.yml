name: Build Store package (.msixupload)

# Produces the package you upload to Partner Center (Microsoft/Xbox Store).
# MANUAL ONLY (workflow_dispatch) — run it from the Actions tab.
#
# It STAMPS your Partner Center identity into the manifest at build time (see the
# "Stamp Store identity" step), so the committed Package.appxmanifest can stay
# dev/sideload-friendly (CN=LichessXbox, used by the dev-Xbox deploy) while the
# Store package carries the real identity. Unlike the sideload build this is NOT
# self-signed — the Store signs it on ingestion.
#
# Store identity (Partner Center → Product identity for "Big Board Chess: Online Chess"):
#   Package/Identity/Name              PatrickEvans.BigBoardChessOnlineChess
#   Package/Identity/Publisher         CN=DD4A08DE-5C68-4ADB-AD6A-7D89ECF3CE17
#   Package/Properties/PublisherDisplayName  Patrick Evans
#   Store ID 9N067RD4F0L1 · PFN PatrickEvans.BigBoardChessOnlineChess_cvq2b8ak7ejk4

on:
  workflow_dispatch:   # works once this file is on the default branch (after merging to main)
  push:
    branches: [ deploy/study-notes-and-resolution ]   # build the Store package on each push to the ship branch

jobs:
  store:
    runs-on: windows-latest

    env:
      Solution: LichessXbox.sln
      Configuration: Release
      Platform: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore $env:Solution

      # Replace the dev identity with the real Store identity for this build only (the working tree
      # is discarded after the run; the committed manifest is untouched). Properties/DisplayName is
      # already "Big Board Chess: Online Chess" and matches the reserved name, so it's left as-is.
      - name: Stamp Store identity
        shell: pwsh
        run: |
          $m = "LichessXbox/Package.appxmanifest"
          $x = Get-Content $m -Raw
          $x = $x -replace 'Name="Lichess\.Xbox\.Chess"', 'Name="PatrickEvans.BigBoardChessOnlineChess"'
          $x = $x -replace 'Publisher="CN=LichessXbox"', 'Publisher="CN=DD4A08DE-5C68-4ADB-AD6A-7D89ECF3CE17"'
          $x = $x -replace '<PublisherDisplayName>LichessXbox</PublisherDisplayName>', '<PublisherDisplayName>Patrick Evans</PublisherDisplayName>'
          Set-Content $m $x -NoNewline
          Write-Host "Stamped Store identity:"; Select-String -Path $m -Pattern 'Identity|PublisherDisplayName|<DisplayName'

      # Pick a UWP SDK actually installed on the runner (same guard as the sideload build).
      - name: Detect installed Windows SDK
        shell: pwsh
        run: |
          $root = "C:\Program Files (x86)\Windows Kits\10\Platforms\UAP"
          $vers = @()
          if (Test-Path $root) {
            $vers = Get-ChildItem $root -Directory |
                    Where-Object { Test-Path (Join-Path $_.FullName 'Platform.xml') } |
                    ForEach-Object { $_.Name } |
                    Where-Object { $_ -match '^10\.0\.' } |
                    Sort-Object { [version]$_ } -Descending
          }
          $vers = @($vers)
          if ($vers.Count -eq 0) { Write-Error "No usable UWP platform SDK found on runner"; exit 1 }
          echo "TPV=$($vers[0])" >> $env:GITHUB_ENV

      # StoreUpload mode emits a .msixupload (the bundle + symbols) — the exact file Partner Center
      # expects. Signing is OFF: the Store re-signs with your account's certificate. x64 covers
      # Xbox + 64-bit Windows; add x86/arm64 to AppxBundlePlatforms for wider Windows reach.
      - name: Build Store package
        run: >
          msbuild $env:Solution
          /p:Configuration=$env:Configuration
          /p:Platform=$env:Platform
          /p:TargetPlatformVersion=$env:TPV
          /p:AppxBundle=Always
          /p:AppxBundlePlatforms="x64"
          /p:UapAppxPackageBuildMode=StoreUpload
          /p:AppxPackageSigningEnabled=false

      - name: Upload .msixupload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BigBoardChess-store
          path: |
            **/AppPackages/**/*.msixupload
          if-no-files-found: error
