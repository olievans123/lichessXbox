<!doctype html>
<html>
<head><meta charset="utf-8"><title>engine</title></head>
<body>
<script>
  // Bridge between the UWP WebView and a Stockfish web worker.
  // C# calls send(cmd); the engine's output is pushed back via window.external.notify.
  var engine = null;
  var queue = [];

  function notify(s) { try { window.external.notify(s); } catch (e) {} }

  function attach(worker) {
    if (engine) return;                 // never attach twice (guards against a late failover)
    engine = worker;
    engine.onmessage = function (e) {
      var line = (typeof e.data === 'string') ? e.data : (e.data && e.data.data) || '';
      if (line) notify(line);
    };
    engine.onerror = function (e) { notify('engineerror ' + (e.message || 'worker')); };
    notify('engineready');
    // Flush anything queued before the worker was ready.
    for (var i = 0; i < queue.length; i++) engine.postMessage(queue[i]);
    queue = [];
  }

  // Called from C#: forward a UCI command to the engine.
  function send(cmd) {
    if (engine) engine.postMessage(cmd);
    else queue.push(cmd);
  }

  // Bundled engine first (offline), then a CDN fallback (online) if it's ever missing.
  var sources = [
    'stockfish.js',
    'https://cdn.jsdelivr.net/npm/stockfish@10.0.2/src/stockfish.asm.js'
  ];

  // Only attach once a worker has PROVEN it loaded: probe with "uci" and wait for the
  // engine's first reply. A load failure (404 / CSP / cross-origin) fires onerror, so we
  // fall through to the next source instead of telling C# the engine is ready and then
  // going silent. A safety timeout attaches best-effort in case a live engine doesn't echo.
  (function boot(i) {
    if (engine) return;
    if (i >= sources.length) { notify('engineerror no-engine-source'); return; }

    var w;
    try { w = new Worker(sources[i]); }
    catch (err) { boot(i + 1); return; }

    var settled = false;
    function next() { if (!settled) { settled = true; try { w.terminate(); } catch (e) {} boot(i + 1); } }
    function ok() { if (!settled) { settled = true; attach(w); } }

    w.onerror = next;                  // couldn't load this source — try the next
    w.onmessage = ok;                  // first reply proves it's alive — attach for real
    try { w.postMessage('uci'); } catch (e) {}
    setTimeout(function () { if (!settled && !engine) ok(); }, 4000);  // best-effort fallback
  })(0);
</script>
</body>
</html>
